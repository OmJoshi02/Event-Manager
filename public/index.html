<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb, #ff416c);
      font-family: Arial;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 20px;
      color: #6a11cb;
    }

    .btn {
      background: linear-gradient(135deg, #6a11cb, #ff416c);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }

    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h1>🎟 Event Manager</h1>
    <p>Login to continue</p>

    <a class="btn" href="/auth/google">
      Login with Google
    </a>
  </div>

</body>
</html>
